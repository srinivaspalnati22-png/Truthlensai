<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens AI | Portal Access</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#6366f1', secondary: '#a855f7', dark: '#020617', panel: '#0f172a' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-bg {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: orbFloat 20s infinite alternate ease-in-out;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #6366f1;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #a855f7;
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: #ec4899;
            top: 40%;
            left: 60%;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(50px, -50px) scale(1.1);
            }

            100% {
                transform: translate(-30px, 40px) scale(0.9);
            }
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .animated-border {
            position: relative;
        }

        .animated-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: linear-gradient(45deg, #6366f1, #a855f7, #ec4899, #6366f1);
            background-size: 200% 200%;
            z-index: -1;
            animation: borderGlow 4s linear infinite;
        }

        @keyframes borderGlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body class="login-bg min-h-screen text-slate-200 antialiased flex items-center justify-center relative p-6">

    <!-- Background Animations -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Login Container -->
    <div class="relative z-10 w-full max-w-md animate-zoom-in-up">

        <!-- Logo Header -->
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-[0_0_30px_rgba(99,102,241,0.5)] mb-6">
                <i class="fas fa-shield-check text-white text-4xl"></i>
            </div>
            <h1 class="font-display font-black text-4xl text-white tracking-widest uppercase mb-2">Truth<span
                    class="text-primary">Lens</span></h1>
            <p class="text-slate-400 font-mono text-sm tracking-widest uppercase">Authorized Access Only</p>
        </div>

        <!-- Glass Login Card -->
        <div class="glass-card rounded-3xl p-8 animated-border">
            <div id="loginForm">
                <div class="mb-6">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2"><i
                            class="fas fa-user text-primary mr-1"></i> Neural ID / Email</label>
                    <input type="email" value="analyst@truthlens.ai"
                        class="w-full bg-black/40 border border-slate-700/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors text-lg"
                        readonly>
                </div>

                <div class="mb-8">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2"><i
                            class="fas fa-lock text-primary mr-1"></i> Security Clearance Key</label>
                    <input type="password" value="**************"
                        class="w-full bg-black/40 border border-slate-700/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors text-lg"
                        readonly>
                </div>

                <div class="flex items-center justify-between mb-8">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" checked class="accent-primary w-4 h-4 rounded cursor-pointer">
                        <span
                            class="text-sm text-slate-400 font-medium group-hover:text-white transition-colors">Remember
                            Node</span>
                    </label>
                    <a href="#" class="text-sm font-bold text-primary hover:text-secondary transition-colors">Decrypt
                        Password?</a>
                </div>

                <button id="demoLoginBtn"
                    class="w-full py-4 bg-gradient-to-r from-primary to-secondary text-white rounded-xl font-display font-bold text-lg hover:-translate-y-1 hover:shadow-[0_0_25px_rgba(168,85,247,0.5)] transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-fingerprint text-xl"></i> Authenticate Demo
                </button>
            </div>

            <!-- Authenticaton Loader -->
            <div id="authLoader" class="hidden flex-col items-center justify-center py-10">
                <i class="fas fa-circle-notch fa-spin text-5xl text-primary mb-4"></i>
                <p class="text-slate-300 font-bold font-mono tracking-widest uppercase animate-pulse">Verifying
                    Credentials...</p>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="mt-8 text-center text-sm">
            <a href="/" class="text-slate-500 hover:text-white transition-colors inline-flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Return to Public Gateway
            </a>
        </div>
    </div>

    <!-- Global Notifications -->
    <div id="toastContainer" class="fixed top-6 right-6 z-[100] flex flex-col gap-3"></div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <script>
        document.getElementById('demoLoginBtn').addEventListener('click', () => {
            const form = document.getElementById('loginForm');
            const loader = document.getElementById('authLoader');

            form.classList.add('hidden');
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            setTimeout(() => {
                showToast("Authentication Successful. Welcome Analyst.", "success");
                setTimeout(() => {
                    window.location.href = '/home';
                }, 1500);
            }, 1500);
        });
    </script>
</body>

</html>
